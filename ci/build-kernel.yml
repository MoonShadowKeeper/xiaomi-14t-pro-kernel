name: 🏗️ Build Xiaomi 14T Pro Kernel (6.1.138) — Bazel/Kleaf

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: "Kernel source repo (owner/repo)"
        required: true
        default: "MoonShadowKeeper/xiaomi-14t-pro-kernel"
      KERNEL_BRANCH:
        description: "Kernel branch"
        required: true
        default: "master"
      KLEAF_TARGET:
        description: "Kleaf dist target"
        required: true
        default: "//common:kernel_aarch64_dist"
      BUILD_CONFIG:
        description: "Optional BUILD_CONFIG fallback, only if repo lacks Kleaf target"
        required: false
        default: "common/build.config.gki.aarch64"
      SUSFS_BRANCH:
        description: "SUSFS branch for kernel 6.1"
        required: true
        default: "kernel-6.1"
      ENABLE_KPM:
        description: "Enable KPM (Kernel Plugin Module)"
        required: false
        default: "true"
        type: boolean
      UPLOAD_RELEASE:
        description: "Upload GitHub Release"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write
  actions: read

env:
  KERNEL_VERSION: "6.1.138"
  ARCH: arm64
  SUBARCH: arm64
  SUKISU_REPO: "SukiSU-Ultra/SukiSU-Ultra"
  SUKISU_BRANCH: "main"
  SUSFS_REPO: "simonpunk/susfs4ksu"
  TZ: "UTC"

jobs:
  build:
    name: Build Kernel with Bazel/Kleaf
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
      # ─────────────────────────────────────────────────
      # 1. SELF-HOSTED RUNNER SETUP
      # ─────────────────────────────────────────────────
      - name: 🧹 Clean workspace
        run: |
          rm -rf kernel_source AnyKernel3 out dist artifacts *.zip || true

      - name: 🛠️ Ensure build dependencies
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq || true
            sudo apt-get install -y --no-install-recommends \
              bc binutils bison build-essential ca-certificates ccache curl flex \
              git jq kmod libelf-dev libssl-dev libncurses-dev lz4 make \
              ninja-build pahole perl python3 python3-pip rsync unzip wget \
              xz-utils zip zstd file || \
              echo "::warning::Could not install all deps automatically — check the self-hosted runner"
          else
            echo "::warning::apt-get not found — make sure build deps are installed"
          fi

      # ─────────────────────────────────────────────────
      # 2. CLONE KERNEL SOURCE
      # ─────────────────────────────────────────────────
      - name: 📥 Clone kernel source
        run: |
          git clone --depth=1 \
            --branch "${{ github.event.inputs.KERNEL_BRANCH }}" \
            "https://github.com/${{ github.event.inputs.KERNEL_SOURCE }}" \
            kernel_source
          cd kernel_source
          echo "KERNEL_DIR=$(pwd)" >> "$GITHUB_ENV"
          echo "KERNEL_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "Kernel source: ${{ github.event.inputs.KERNEL_SOURCE }} @ $(git rev-parse --short HEAD)"

      - name: 🔎 Detect Kleaf/Bazel layout
        run: |
          cd kernel_source
          echo "Repo root files:"
          ls -la | head -80

          if [ -x "tools/bazel" ]; then
            echo "BAZEL_CMD=tools/bazel" >> "$GITHUB_ENV"
            echo "Found Kleaf wrapper: tools/bazel"
          elif [ -x "build/kernel/kleaf/bazel.sh" ]; then
            echo "BAZEL_CMD=build/kernel/kleaf/bazel.sh" >> "$GITHUB_ENV"
            echo "Found Kleaf wrapper: build/kernel/kleaf/bazel.sh"
          elif command -v bazel >/dev/null 2>&1; then
            echo "BAZEL_CMD=bazel" >> "$GITHUB_ENV"
            echo "Using system bazel"
          elif command -v bazelisk >/dev/null 2>&1; then
            echo "BAZEL_CMD=bazelisk" >> "$GITHUB_ENV"
            echo "Using system bazelisk"
          else
            echo "::error::No Kleaf/Bazel wrapper found. Expected tools/bazel, build/kernel/kleaf/bazel.sh, bazel, or bazelisk."
            exit 1
          fi

          if [ ! -f "MODULE.bazel" ] && [ ! -f "WORKSPACE" ] && [ ! -f "WORKSPACE.bazel" ]; then
            echo "::warning::No MODULE.bazel / WORKSPACE found at repo root. Kleaf target may need a different source tree layout."
          fi

      # ─────────────────────────────────────────────────
      # 3. SUKISU ULTRA + SUSFS
      # ─────────────────────────────────────────────────
      - name: 🔑 Integrate SukiSU Ultra
        run: |
          cd kernel_source
          curl -LSs "https://raw.githubusercontent.com/${{ env.SUKISU_REPO }}/${{ env.SUKISU_BRANCH }}/kernel/setup.sh" -o /tmp/sukisu_setup.sh
          bash /tmp/sukisu_setup.sh "${{ env.SUKISU_BRANCH }}"
          echo "SukiSU Ultra integrated ✓"

      - name: 🕵️ Apply SUSFS v2.1+ patches
        run: |
          SUSFS_DIR=/tmp/susfs4ksu
          rm -rf "$SUSFS_DIR"
          git clone --depth=1 \
            --branch "${{ github.event.inputs.SUSFS_BRANCH }}" \
            "https://github.com/${{ env.SUSFS_REPO }}" \
            "$SUSFS_DIR"

          cd kernel_source

          PATCH_APPLIED=0
          for p in \
            "$SUSFS_DIR/kernel_patches/50_add_susfs_in_kernel-${{ github.event.inputs.SUSFS_BRANCH }}.patch" \
            "$SUSFS_DIR/kernel_patches/50_add_susfs_in_kernel.patch"; do
            if [ -f "$p" ]; then
              echo "Applying $p"
              patch -p1 < "$p" && PATCH_APPLIED=1 && break
            fi
          done

          if [ "$PATCH_APPLIED" != "1" ]; then
            echo "::warning::SUSFS kernel patch was not found/applied. Check SUSFS repo layout."
          fi

          if [ -f "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" ]; then
            patch -p1 < "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" || true
          fi

          echo "SUSFS step done ✓"

      # ─────────────────────────────────────────────────
      # 4. CONFIG FRAGMENT FOR FEATURES
      # ─────────────────────────────────────────────────
      - name: ⚙️ Create feature config fragment
        run: |
          cd kernel_source
          cat > feature_14tpro.config <<'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KPM=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          CONFIG_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_DEFAULT_TCP_CONG="bbr"
          CONFIG_WIREGUARD=y
          CONFIG_ZRAM=y
          CONFIG_ZRAM_DEF_COMP_ZSTD=y
          CONFIG_ZRAM_DEF_COMP="zstd"
          CONFIG_CRYPTO_ZSTD=y
          CONFIG_ZSMALLOC=y
          CONFIG_NTFS3_FS=y
          CONFIG_NTFS3_LZX_XPRESS=y
          CONFIG_NTFS3_FS_POSIX_ACL=y
          CONFIG_EXFAT_FS=y
          CONFIG_LRU_GEN=y
          CONFIG_LRU_GEN_ENABLED=y
          CONFIG_LRU_GEN_STATS=y
          CONFIG_DAMON=y
          CONFIG_DAMON_VADDR=y
          CONFIG_DAMON_PADDR=y
          CONFIG_DAMON_SYSFS=y
          CONFIG_DAMON_RECLAIM=y
          CONFIG_DAMON_LRU_SORT=y
          CONFIG_CPU_IDLE_GOV_TEO=y
          EOF

          echo "Feature config fragment created: feature_14tpro.config"
          cat feature_14tpro.config

      - name: 🧩 Wire feature fragment into Kleaf if possible
        run: |
          cd kernel_source

          # Generic Kleaf override. Many Kleaf trees respect KERNEL_CONFIG_FRAGMENTS.
          echo "KERNEL_CONFIG_FRAGMENTS=$(pwd)/feature_14tpro.config" >> "$GITHUB_ENV"
          echo "KLEAF_EXTRA_ARGS=--//build/kernel/kleaf:config_local=$(pwd)/feature_14tpro.config" >> "$GITHUB_ENV"

          # Best-effort fallback for trees that still use arch configs under Kleaf.
          if [ -f "common/arch/arm64/configs/gki_defconfig" ]; then
            cat feature_14tpro.config >> common/arch/arm64/configs/gki_defconfig
            echo "Appended feature fragment to common/arch/arm64/configs/gki_defconfig"
          elif [ -f "arch/arm64/configs/gki_defconfig" ]; then
            cat feature_14tpro.config >> arch/arm64/configs/gki_defconfig
            echo "Appended feature fragment to arch/arm64/configs/gki_defconfig"
          else
            echo "No gki_defconfig found to append. Relying on Kleaf config fragment env."
          fi

      # ─────────────────────────────────────────────────
      # 5. BAZEL/KLEAF BUILD
      # ─────────────────────────────────────────────────
      - name: 🧪 Query Kleaf target
        run: |
          cd kernel_source
          echo "Bazel command: $BAZEL_CMD"
          echo "Target: ${{ github.event.inputs.KLEAF_TARGET }}"
          $BAZEL_CMD query "${{ github.event.inputs.KLEAF_TARGET }}" || \
            echo "::warning::Target query failed. Build step will still try it. If it fails, set KLEAF_TARGET to a valid *_dist target."

      - name: 🏗️ Build kernel with Bazel/Kleaf
        run: |
          cd kernel_source
          mkdir -p ../dist

          set +e
          $BAZEL_CMD run "${{ github.event.inputs.KLEAF_TARGET }}" \
            -- \
            --dist_dir="$(pwd)/../dist" 2>&1 | tee ../build.log
          STATUS=${PIPESTATUS[0]}
          set -e

          if [ "$STATUS" != "0" ]; then
            echo "::error::Kleaf build failed with status $STATUS"
            echo "Available *_dist targets:"
            $BAZEL_CMD query 'kind(".*", //...:*)' 2>/dev/null | grep -E '(_dist$|kernel_.*dist)' | head -200 || true
            exit "$STATUS"
          fi

          echo "DIST_DIR=$(pwd)/../dist" >> "$GITHUB_ENV"
          echo "Kleaf build done ✓"
          ls -lah ../dist

      # ─────────────────────────────────────────────────
      # 6. PACKAGE ANYKERNEL3
      # ─────────────────────────────────────────────────
      - name: 📦 Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

          IMAGE=""
          for f in \
            dist/Image.gz-dtb \
            dist/Image.gz \
            dist/Image \
            dist/bzImage; do
            if [ -f "$f" ]; then IMAGE="$f"; break; fi
          done

          if [ -z "$IMAGE" ]; then
            echo "::error::No kernel image found in dist. Files:"
            find dist -maxdepth 2 -type f | sort
            exit 1
          fi

          cp "$IMAGE" AnyKernel3/$(basename "$IMAGE")
          [ -f dist/dtbo.img ] && cp dist/dtbo.img AnyKernel3/ || true
          [ -f dist/vendor_dlkm.img ] && cp dist/vendor_dlkm.img AnyKernel3/ || true
          [ -f dist/system_dlkm.img ] && cp dist/system_dlkm.img AnyKernel3/ || true

          cat > AnyKernel3/anykernel.sh <<'ANYKERNEL'
          ## AnyKernel3 Ramdisk Mod Script
          properties() { '
          kernel.string=SukiSU Ultra | Xiaomi 14T Pro | Kernel 6.1.138 | Bazel/Kleaf
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=vermeer
          device.name2=xiaomi14tpro
          supported.versions=14-15
          supported.patchlevels=
          '; }
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          . split_img;
          . flash_boot;
          ANYKERNEL

          BUILD_DATE=$(date +"%Y%m%d-%H%M")
          ZIP_NAME="SukiSU-Ultra_Xiaomi14TPro_K6.1.138_Kleaf_${BUILD_DATE}.zip"
          cd AnyKernel3
          zip -r9 "../${ZIP_NAME}" . -x "*.git*" -x "*.github*" -x "LICENCE" -x "README.md"
          cd ..
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "ZIP_PATH=$(pwd)/${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_ENV"
          echo "AnyKernel3 zip created: ${ZIP_NAME} ✓"

      # ─────────────────────────────────────────────────
      # 7. UPLOAD ARTIFACTS / RELEASE
      # ─────────────────────────────────────────────────
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-xiaomi14tpro-kleaf-${{ env.BUILD_DATE }}
          path: |
            ${{ env.ZIP_PATH }}
            dist/**
            build.log
          retention-days: 7

      - name: 🏷️ Create GitHub Release
        if: ${{ github.event.inputs.UPLOAD_RELEASE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "kleaf-v6.1.138-${{ env.BUILD_DATE }}"
          name: "SukiSU Ultra Kleaf | Xiaomi 14T Pro | ${{ env.BUILD_DATE }}"
          body: |
            ## Xiaomi 14T Pro Kernel — 6.1.138, Bazel/Kleaf

            **Device:** Xiaomi 14T Pro (vermeer)  
            **Build system:** Bazel/Kleaf  
            **Kleaf target:** `${{ github.event.inputs.KLEAF_TARGET }}`  
            **Kernel source:** `${{ github.event.inputs.KERNEL_SOURCE }}`  
            **Branch:** `${{ github.event.inputs.KERNEL_BRANCH }}`  
            **Commit:** `${{ env.KERNEL_HASH }}`

            ### Included features
            - SukiSU Ultra
            - SUSFS v2.1+
            - KPM
            - BBR
            - WireGuard
            - ZRAM + ZSTD
            - NTFS3 + ExFAT
            - MGLRU
            - DAMON
            - TEO governor

            Flash the AnyKernel3 zip only on Xiaomi 14T Pro / vermeer.
          files: |
            ${{ env.ZIP_PATH }}
            build.log
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─────────────────────────────────────────────────
      # 8. CLEANUP
      # ─────────────────────────────────────────────────
      - name: 🧹 Clean up self-hosted runner
        if: always()
        run: |
          rm -rf kernel_source AnyKernel3 *.zip /tmp/susfs4ksu /tmp/sukisu_setup.sh || true
          echo "Runner cleaned ✓"
