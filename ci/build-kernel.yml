name: 🏗️ Build Xiaomi 14T Pro Kernel (6.1.138) — GKI/Kleaf

on:
  workflow_dispatch:
    inputs:
      ACK_BRANCH:
        description: "Android Common Kernel manifest branch"
        required: true
        default: "common-android14-6.1"
      KLEAF_TARGET:
        description: "Kleaf dist target"
        required: true
        default: "//common:kernel_aarch64_dist"
      SUSFS_BRANCH:
        description: "SUSFS branch (must match kernel 6.1)"
        required: true
        default: "gki-android14-6.1"
      ENABLE_KPM:
        description: "Enable KPM (Kernel Plugin Module)"
        required: false
        default: "true"
        type: boolean
      UPLOAD_RELEASE:
        description: "Upload GitHub Release"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: write
  actions: read

env:
  KERNEL_VERSION: "6.1.138"
  ARCH: arm64
  SUKISU_REPO: "SukiSU-Ultra/SukiSU-Ultra"
  SUKISU_REF: "v4.1.3"
  SUSFS_GITLAB: "https://gitlab.com/simonpunk/susfs4ksu.git"
  TZ: "UTC"
  HOME: "/root"

jobs:
  build:
    name: Build GKI Kernel with Kleaf
    runs-on: self-hosted
    timeout-minutes: 240

    steps:
      # ─────────────────────────────────────────────────
      # 1. SELF-HOSTED RUNNER SETUP
      # ─────────────────────────────────────────────────
      - name: 📦 Checkout repo (vendored deps)
        uses: actions/checkout@v4
        with:
          path: repo


      - name: 🧹 Clean build artifacts (keep kernel_workspace cache)
        run: |
          # Keep kernel_workspace between runs for fast incremental repo sync.
          rm -rf AnyKernel3 *.zip build.log || true

      - name: 🛠️ Ensure build dependencies
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq || true
            sudo apt-get install -y --no-install-recommends \
              bc binutils bison build-essential ca-certificates ccache curl flex \
              git jq kmod libelf-dev libssl-dev libncurses-dev lz4 make \
              ninja-build pahole perl python3 python3-pip rsync unzip wget \
              xz-utils zip zstd file python-is-python3 || \
              echo "::warning::Could not install all deps automatically — check the self-hosted runner"
          else
            echo "::warning::apt-get not found — make sure build deps are installed"
          fi

      - name: 🔧 Install repo tool
        run: |
          mkdir -p "$HOME/bin"
          if [ ! -x "$HOME/bin/repo" ]; then
            curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
            chmod a+x "$HOME/bin/repo"
          fi
          echo "$HOME/bin" >> "$GITHUB_PATH"
          git config --global user.email "ci@local"
          git config --global user.name "CI Builder"
          git config --global color.ui false

      # ─────────────────────────────────────────────────
      # 2. SYNC CLEAN GKI SOURCES FROM GOOGLE (ACK)
      # ─────────────────────────────────────────────────
      - name: 📥 repo init + sync Android Common Kernel
        run: |
          mkdir -p kernel_workspace
          cd kernel_workspace

          if [ -d .repo ]; then
            echo "Reusing cached workspace — clearing stale locks + local changes"
            # Remove stale lock files left by interrupted fetches/syncs
            find .repo -name '*.lock' -delete 2>/dev/null || true
            find . -path '*/.git/*.lock' -delete 2>/dev/null || true
            find . -name 'shallow.lock' -delete 2>/dev/null || true
            repo forall -c 'git reset --hard -q; git clean -fdq' 2>/dev/null || true
            repo init --depth=1 \
              -u https://android.googlesource.com/kernel/manifest \
              -b "${{ github.event.inputs.ACK_BRANCH }}"
            if ! repo sync -c -j"$(nproc)" --no-tags --force-sync --optimized-fetch; then
              echo "Incremental sync failed — wiping cache and doing a clean sync"
              cd ..
              rm -rf kernel_workspace
              mkdir -p kernel_workspace
              cd kernel_workspace
              repo init --depth=1 \
                -u https://android.googlesource.com/kernel/manifest \
                -b "${{ github.event.inputs.ACK_BRANCH }}"
              repo sync -c -j"$(nproc)" --no-tags --fail-fast
            fi
          else
            echo "Fresh workspace — full repo init + sync"
            repo init --depth=1 \
              -u https://android.googlesource.com/kernel/manifest \
              -b "${{ github.event.inputs.ACK_BRANCH }}"
            repo sync -c -j"$(nproc)" --no-tags --fail-fast
          fi

          echo "Synced. Common kernel version:"
          head -5 common/Makefile || true

      - name: 🔎 Verify Kleaf wrapper
        run: |
          cd kernel_workspace
          if [ ! -x "tools/bazel" ]; then
            echo "::error::tools/bazel not found after repo sync. ACK branch may be wrong."
            ls -la
            exit 1
          fi
          echo "Kleaf wrapper present ✓"

      # ─────────────────────────────────────────────────
      # 3. SUKISU ULTRA + SUSFS INTO common/
      # ─────────────────────────────────────────────────
      - name: 🔑 Integrate SukiSU Ultra
        run: |
          cd kernel_workspace/common
          curl -LSs "https://raw.githubusercontent.com/${{ env.SUKISU_REPO }}/main/kernel/setup.sh" -o /tmp/sukisu_setup.sh
          bash /tmp/sukisu_setup.sh "${{ env.SUKISU_REF }}"
          echo "SukiSU Ultra integrated ✓"

      - name: 🕵️ Apply SUSFS v2.1+ (vendored)
        run: |
          DEPS="$GITHUB_WORKSPACE/repo/deps/susfs"
          cd kernel_workspace/common

          # SUSFS new source files (no conflict — fresh files)
          cp "$DEPS"/fs/susfs.c fs/ 2>/dev/null || true
          cp "$DEPS"/include/linux/susfs*.h include/linux/ 2>/dev/null || true

          PATCH="$DEPS/50_add_susfs_in_gki-android14-6.1.patch"
          [ -f "$PATCH" ] || { echo "::error::vendored SUSFS patch missing at $PATCH"; exit 1; }
          echo "Using vendored SUSFS patch: $PATCH"

          # Apply with patch(1) using fuzz so minor context/line-number drift at
          # the current ACK HEAD is tolerated (no slow git history fetch needed).
          if patch -p1 --no-backup-if-mismatch --fuzz=3 < "$PATCH"; then
            echo "SUSFS applied via patch --fuzz=3 ✓"
          else
            echo "::error::SUSFS patch failed even with fuzz. Check .rej files below."
            find . -name '*.rej' -exec echo '--- {} ---' \; -exec cat {} \; 2>/dev/null | head -120
            exit 1
          fi

      - name: 🛡️ Integrate Baseband Guard (vendored)
        run: |
          DEPS="$GITHUB_WORKSPACE/repo/deps/baseband-guard"
          cd kernel_workspace/common

          # Vendor BBG into the kernel tree
          rm -rf Baseband-guard
          cp -r "$DEPS" Baseband-guard

          # Wire into security/ (mirrors BBG setup.sh modern-LSM path)
          ln -sfn ../Baseband-guard security/baseband-guard
          grep -q 'baseband-guard/baseband_guard.o' security/Makefile || \
            grep -q 'obj-$(CONFIG_BBG)' security/Makefile || \
            printf '\nobj-$(CONFIG_BBG) += baseband-guard/\n' >> security/Makefile

          if ! grep -q 'security/baseband-guard/Kconfig' security/Kconfig; then
            awk '
              { a[NR]=$0 } END{
                last=0; for(i=1;i<=NR;i++) if(a[i] ~ /^endmenu[[:space:]]*$/) last=i;
                for(i=1;i<=NR;i++){
                  if(i==last) print "source \"security/baseband-guard/Kconfig\"";
                  print a[i];
                }
              }' security/Kconfig > security/Kconfig.tmp && mv security/Kconfig.tmp security/Kconfig
          fi
          echo "Baseband Guard integrated ✓"

      # ─────────────────────────────────────────────────
      # 4. FEATURE CONFIG FRAGMENT
      # ─────────────────────────────────────────────────
      - name: ⚙️ Append feature configs to gki_defconfig
        run: |
          cd kernel_workspace/common
          DEFCFG="arch/arm64/configs/gki_defconfig"

          cat >> "$DEFCFG" <<'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_BBG=y
          CONFIG_LSM="landlock,lockdown,yama,loadpin,safesetid,integrity,selinux,smack,tomoyo,apparmor,bpf,baseband_guard"
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_KPM=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_DEFAULT_TCP_CONG="bbr"
          CONFIG_WIREGUARD=y
          CONFIG_ZRAM=y
          CONFIG_ZRAM_DEF_COMP_ZSTD=y
          CONFIG_ZRAM_DEF_COMP="zstd"
          CONFIG_CRYPTO_ZSTD=y
          CONFIG_ZSMALLOC=y
          CONFIG_NTFS3_FS=y
          CONFIG_NTFS3_LZX_XPRESS=y
          CONFIG_NTFS3_FS_POSIX_ACL=y
          CONFIG_EXFAT_FS=y
          CONFIG_LRU_GEN=y
          CONFIG_LRU_GEN_ENABLED=y
          CONFIG_LRU_GEN_STATS=y
          CONFIG_DAMON=y
          CONFIG_DAMON_VADDR=y
          CONFIG_DAMON_PADDR=y
          CONFIG_DAMON_SYSFS=y
          CONFIG_DAMON_RECLAIM=y
          CONFIG_DAMON_LRU_SORT=y
          CONFIG_CPU_IDLE_GOV_TEO=y
          EOF

          echo "Appended feature configs to $DEFCFG"
          tail -50 "$DEFCFG"

      - name: 🩹 Disable check_defconfig (we add extra configs)
        run: |
          cd kernel_workspace/common
          # Kleaf runs POST_DEFCONFIG_CMDS="check_defconfig" which fails because our
          # appended options make gki_defconfig diverge from savedefconfig form.
          for f in build.config.gki build.config.gki.aarch64; do
            if [ -f "$f" ] && grep -q "check_defconfig" "$f"; then
              sed -i 's/check_defconfig//g' "$f"
              echo "Neutralized check_defconfig in $f"
            fi
          done
          grep -rn "POST_DEFCONFIG_CMDS" build.config.* || true

      # ─────────────────────────────────────────────────
      # 5. BUILD WITH BAZEL/KLEAF
      # ─────────────────────────────────────────────────
      - name: 🏗️ Build kernel (tools/bazel run dist)
        run: |
          cd kernel_workspace
          mkdir -p dist

          set +e
          tools/bazel run "${{ github.event.inputs.KLEAF_TARGET }}" \
            --config=fast \
            -- --dist_dir="$(pwd)/dist" 2>&1 | tee ../build.log
          STATUS=${PIPESTATUS[0]}
          set -e

          if [ "$STATUS" != "0" ]; then
            echo "::error::Kleaf build failed with status $STATUS"
            echo "Available dist targets:"
            tools/bazel query 'kind(".*", //common:*)' 2>/dev/null | grep -E '_dist$' | head -100 || true
            exit "$STATUS"
          fi

          echo "DIST_DIR=$(pwd)/dist" >> "$GITHUB_ENV"
          echo "Build done ✓"
          ls -lah dist

      # ─────────────────────────────────────────────────
      # 6. PACKAGE ANYKERNEL3
      # ─────────────────────────────────────────────────
      - name: 📦 Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3

          DIST="kernel_workspace/dist"
          IMAGE=""
          for f in "$DIST/Image.gz-dtb" "$DIST/Image.gz" "$DIST/Image"; do
            [ -f "$f" ] && IMAGE="$f" && break
          done

          if [ -z "$IMAGE" ]; then
            echo "::error::No kernel image found in dist:"
            find "$DIST" -maxdepth 1 -type f | sort
            exit 1
          fi

          cp "$IMAGE" "AnyKernel3/$(basename "$IMAGE")"
          [ -f "$DIST/dtbo.img" ] && cp "$DIST/dtbo.img" AnyKernel3/ || true

          cat > AnyKernel3/anykernel.sh <<'ANYKERNEL'
          ## AnyKernel3 Ramdisk Mod Script
          properties() { '
          kernel.string=SukiSU Ultra | Xiaomi 14T Pro (rothko) | GKI 6.1.138
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=rothko
          device.name2=xiaomi14tpro
          supported.versions=14-15
          supported.patchlevels=
          '; }
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          . split_img;
          . flash_boot;
          ANYKERNEL

          BUILD_DATE=$(date +"%Y%m%d-%H%M")
          ZIP_NAME="SukiSU-Ultra_Xiaomi14TPro_GKI6.1.138_${BUILD_DATE}.zip"
          cd AnyKernel3
          zip -r9 "../${ZIP_NAME}" . -x "*.git*" -x "*.github*" -x "LICENCE" -x "README.md"
          cd ..
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "ZIP_PATH=$(pwd)/${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_ENV"
          echo "AnyKernel3 zip: ${ZIP_NAME} ✓"

      # ─────────────────────────────────────────────────
      # 7. UPLOAD ARTIFACTS / RELEASE
      # ─────────────────────────────────────────────────
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-xiaomi14tpro-gki-${{ env.BUILD_DATE }}
          path: |
            ${{ env.ZIP_PATH }}
            kernel_workspace/dist/Image*
            build.log
          retention-days: 7

      - name: 🏷️ Create GitHub Release
        if: ${{ github.event.inputs.UPLOAD_RELEASE == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "gki-v6.1.138-${{ env.BUILD_DATE }}"
          name: "SukiSU Ultra GKI | Xiaomi 14T Pro | ${{ env.BUILD_DATE }}"
          body: |
            ## Xiaomi 14T Pro Kernel — GKI 6.1.138 (clean Google ACK + Kleaf)

            **Device:** Xiaomi 14T Pro (rothko)  
            **Build system:** Bazel/Kleaf from Android Common Kernel  
            **ACK branch:** `${{ github.event.inputs.ACK_BRANCH }}`  
            **Kleaf target:** `${{ github.event.inputs.KLEAF_TARGET }}`

            ### Features
            - SukiSU Ultra
            - SUSFS v2.1+
            - KPM
            - BBR
            - WireGuard
            - ZRAM + ZSTD
            - NTFS3 + ExFAT
            - MGLRU
            - DAMON
            - TEO governor

            > GKI image. Flash on Xiaomi 14T Pro (rothko) only.
          files: |
            ${{ env.ZIP_PATH }}
            build.log
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─────────────────────────────────────────────────
      # 8. CLEANUP
      # ─────────────────────────────────────────────────
      - name: 🧹 Clean up self-hosted runner
        if: always()
        run: |
          rm -rf AnyKernel3 *.zip /tmp/susfs4ksu /tmp/sukisu_setup.sh || true
          echo "Runner cleaned ✓"
