name: Build Xiaomi 14T Pro Kernel 6.1.138 Wild KernelSU-Next

on:
  workflow_dispatch:
    inputs:
      ACK_BRANCH:
        description: "Android Common Kernel manifest branch"
        required: true
        default: "common-android14-6.1-2025-06"
      KLEAF_TARGET:
        description: "Kleaf dist target"
        required: true
        default: "//common:kernel_aarch64_dist"
      UPLOAD_RELEASE:
        description: "Upload GitHub Release"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  actions: read

env:
  KERNEL_VERSION: "6.1.138"
  ARCH: arm64
  KSUN_SETUP_URL: "https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh"
  KSUN_REF: "dev-susfs"
  SUSFS_GITLAB: "https://gitlab.com/simonpunk/susfs4ksu.git"
  TZ: "UTC"
  HOME: "/root"

jobs:
  build:
    name: Build Wild FULL KernelSU-Next plus extras
    runs-on: self-hosted
    timeout-minutes: 240

    steps:
      - name: Checkout repo vendored deps
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Clean build artifacts keep kernel workspace cache
        run: |
          rm -rf AnyKernel3 *.zip build.log || true

      - name: Ensure build dependencies
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq || true
            sudo apt-get install -y --no-install-recommends \
              bc binutils bison build-essential ca-certificates ccache curl flex \
              git jq kmod libelf-dev libssl-dev libncurses-dev lz4 make \
              ninja-build pahole perl python3 python3-pip rsync unzip wget \
              xz-utils zip zstd file python-is-python3 || \
              echo "::warning::Could not install all deps automatically"
          else
            echo "::warning::apt-get not found. Make sure build deps are installed"
          fi

      - name: Set WildKernels build timestamp
        run: |
          FIXED_BUILD_DATE="2025-06-05 04:20:00 UTC"
          SOURCE_DATE_EPOCH=$(date -u -d "$FIXED_BUILD_DATE" +%s)
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH" >> "$GITHUB_ENV"
          echo "KBUILD_BUILD_TIMESTAMP=$(date -u -d @${SOURCE_DATE_EPOCH} '+%a %b %d %H:%M:%S UTC %Y')" >> "$GITHUB_ENV"
          echo "GIT_COMMITTER_DATE=$(date -u -d @${SOURCE_DATE_EPOCH} '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          echo "GIT_AUTHOR_DATE=$(date -u -d @${SOURCE_DATE_EPOCH} '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Install repo tool
        run: |
          mkdir -p "$HOME/bin"
          if [ ! -x "$HOME/bin/repo" ]; then
            curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
            chmod a+x "$HOME/bin/repo"
          fi
          echo "$HOME/bin" >> "$GITHUB_PATH"
          git config --global user.email "ci@local"
          git config --global user.name "CI Builder"
          git config --global color.ui false

      - name: Repo init and sync Android Common Kernel
        run: |
          mkdir -p kernel_workspace
          cd kernel_workspace

          if [ -d .repo ]; then
            echo "Reusing cached workspace"
            find .repo -name '*.lock' -delete 2>/dev/null || true
            find . -path '*/.git/*.lock' -delete 2>/dev/null || true
            find . -name 'shallow.lock' -delete 2>/dev/null || true
            repo forall -c 'git reset --hard -q; git clean -fdq' 2>/dev/null || true
            repo init --depth=1 \
              -u https://android.googlesource.com/kernel/manifest \
              -b "${{ github.event.inputs.ACK_BRANCH }}"
            if ! repo sync -c -j"$(nproc)" --no-tags --force-sync --optimized-fetch; then
              echo "Incremental sync failed. Wiping cache and doing clean sync"
              cd ..
              rm -rf kernel_workspace
              mkdir -p kernel_workspace
              cd kernel_workspace
              repo init --depth=1 \
                -u https://android.googlesource.com/kernel/manifest \
                -b "${{ github.event.inputs.ACK_BRANCH }}"
              repo sync -c -j"$(nproc)" --no-tags --fail-fast
            fi
          else
            echo "Fresh workspace"
            repo init --depth=1 \
              -u https://android.googlesource.com/kernel/manifest \
              -b "${{ github.event.inputs.ACK_BRANCH }}"
            repo sync -c -j"$(nproc)" --no-tags --fail-fast
          fi

          echo "Synced. Common kernel version:"
          head -5 common/Makefile || true

      - name: Verify Kleaf wrapper
        run: |
          cd kernel_workspace
          if [ ! -x tools/bazel ]; then
            echo "::error::tools/bazel not found after repo sync"
            exit 1
          fi
          echo "Kleaf wrapper present"

      - name: Setup KernelSU-Next Wild style
        run: |
          cd kernel_workspace
          curl -LSs "${{ env.KSUN_SETUP_URL }}" | bash -s "${{ env.KSUN_REF }}"

          cd KernelSU-Next/kernel
          COMMITS_COUNT=$(git rev-list --count HEAD)
          KSU_VERSION=$((30000 + COMMITS_COUNT))
          sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild || true
          KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.1)"
          sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild || true
          echo "KernelSU-Next version fallback: ${KSU_VERSION} ${KSU_GIT_TAG}"

          cd ..
          curl -LSs "https://raw.githubusercontent.com/WildKernels/GKI_KernelSU_SUSFS/main/.github/actions/kernelsu/patches/static.patch" -o static.patch
          if patch --dry-run -p1 < static.patch >/dev/null 2>&1; then
            patch -p1 < static.patch
            echo "Wild KernelSU-Next static.patch applied"
          else
            echo "::warning::Wild static.patch did not apply cleanly, skipping"
          fi

      - name: Apply SUSFS v2.1 plus vendored patch
        run: |
          DEPS="$GITHUB_WORKSPACE/repo/deps/susfs"
          cd kernel_workspace/common

          cp "$DEPS"/fs/susfs.c fs/ 2>/dev/null || true
          cp "$DEPS"/include/linux/susfs*.h include/linux/ 2>/dev/null || true

          PATCH="$DEPS/50_add_susfs_in_gki-android14-6.1.patch"
          [ -f "$PATCH" ] || { echo "::error::vendored SUSFS patch missing at $PATCH"; exit 1; }

          if patch -p1 --no-backup-if-mismatch --fuzz=3 < "$PATCH"; then
            echo "SUSFS applied"
          else
            echo "::error::SUSFS patch failed. Rejects:"
            find . -name '*.rej' -exec echo '--- {} ---' \; -exec cat {} \; 2>/dev/null | head -160
            exit 1
          fi

      - name: Integrate Baseband Guard vendored
        run: |
          DEPS="$GITHUB_WORKSPACE/repo/deps/baseband-guard"
          cd kernel_workspace/common

          rm -rf Baseband-guard
          cp -r "$DEPS" Baseband-guard
          ln -sfn ../Baseband-guard security/baseband-guard
          grep -q 'baseband-guard/baseband_guard.o' security/Makefile || \
            grep -q 'obj-$(CONFIG_BBG)' security/Makefile || \
            printf '\nobj-$(CONFIG_BBG) += baseband-guard/\n' >> security/Makefile

          if ! grep -q 'security/baseband-guard/Kconfig' security/Kconfig; then
            awk '
              { a[NR]=$0 } END{
                last=0; for(i=1;i<=NR;i++) if(a[i] ~ /^endmenu[[:space:]]*$/) last=i;
                for(i=1;i<=NR;i++){
                  if(i==last) print "source \"security/baseband-guard/Kconfig\"";
                  print a[i];
                }
              }' security/Kconfig > security/Kconfig.tmp && mv security/Kconfig.tmp security/Kconfig
          fi
          echo "Baseband Guard integrated"

      - name: DroidSpaces-OSS Wild style
        run: |
          cd kernel_workspace
          rm -rf Droidspaces-OSS
          git clone --depth=1 https://github.com/ravindu644/Droidspaces-OSS.git
          cd common
          cp ../Droidspaces-OSS/Documentation/resources/kernel-patches/GKI/below-kernel-6.12/001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch ./
          patch -p1 < 001.GKI-below-6.12-fix_sysvipc_kabi_6_7_8.patch
          git add -A && git commit -q -m "Wild: DroidSpaces-OSS" || true

      - name: Append Wild FULL configs plus user extras
        run: |
          cd kernel_workspace/common
          DEFCFG="arch/arm64/configs/gki_defconfig"

          cat >> "$DEFCFG" <<'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_MANUAL_HOOK=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y

          CONFIG_BBG=y
          CONFIG_LSM="landlock,lockdown,yama,loadpin,safesetid,integrity,selinux,smack,tomoyo,apparmor,bpf,baseband_guard"

          CONFIG_PID_NS=y
          CONFIG_SYSVIPC=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_IPC_NS=y
          CONFIG_DEVTMPFS=y
          CONFIG_BINFMT_MISC=y
          CONFIG_BINFMT_SCRIPT=y
          CONFIG_BINFMT_ELF=y

          CONFIG_OVERLAY_FS=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_KALLSYMS=y
          CONFIG_KALLSYMS_ALL=y

          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_NETFILTER_XT_TARGET_LOG=y
          CONFIG_NETFILTER_XT_MATCH_RECENT=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y

          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_TCP_CONG_CUBIC=y
          CONFIG_TCP_CONG_BIC=y
          CONFIG_TCP_CONG_WESTWOOD=y
          CONFIG_TCP_CONG_HTCP=y
          CONFIG_DEFAULT_BBR=y
          CONFIG_DEFAULT_TCP_CONG="bbr"
          CONFIG_NET_SCH_FQ=y
          CONFIG_NET_SCH_FQ_CODEL=y
          CONFIG_RFKILL=y

          CONFIG_ZSMALLOC=m
          CONFIG_ZRAM=m
          CONFIG_ZSTD_COMPRESS=y
          CONFIG_ZSTD_DECOMPRESS=y
          CONFIG_ZRAM_DEF_COMP_ZSTD=y
          CONFIG_ZRAM_DEF_COMP="zstd"

          CONFIG_EXFAT_FS=y
          CONFIG_NTFS3_FS=y
          CONFIG_NTFS3_LZX_XPRESS=y
          CONFIG_NTFS3_FS_POSIX_ACL=y

          CONFIG_LRU_GEN=y
          CONFIG_LRU_GEN_ENABLED=y
          CONFIG_LRU_GEN_STATS=y

          CONFIG_DAMON=y
          CONFIG_DAMON_VADDR=y
          CONFIG_DAMON_PADDR=y
          CONFIG_DAMON_SYSFS=y
          CONFIG_DAMON_RECLAIM=y
          CONFIG_DAMON_LRU_SORT=y

          CONFIG_CPU_IDLE_GOV_TEO=y
          EOF

          echo "Appended Wild FULL plus user extras"
          tail -120 "$DEFCFG"

      - name: Disable check_defconfig
        run: |
          cd kernel_workspace/common
          for f in build.config.gki build.config.gki.aarch64; do
            if [ -f "$f" ] && grep -q "check_defconfig" "$f"; then
              sed -i 's/check_defconfig//g' "$f"
              echo "Neutralized check_defconfig in $f"
            fi
          done
          grep -rn "POST_DEFCONFIG_CMDS" build.config.* || true

      - name: Apply WildKernels branding and module version bypass
        run: |
          cd kernel_workspace/common

          sed -i '$d' scripts/setlocalversion
          echo 'echo "-android14-Wild"' >> scripts/setlocalversion
          chmod +x scripts/setlocalversion

          TARGET_FILE="kernel/module/version.c"
          if [ -f "$TARGET_FILE" ]; then
            sed -i '/bad_version:/{:a;n;/return 0;/{s/return 0;/return 1;/;b};ba}' "$TARGET_FILE"
            if ! grep -A 8 'bad_version:' "$TARGET_FILE" | grep -q 'return 1;'; then
              echo "::error::module version bypass failed"
              grep -A 12 'bad_version:' "$TARGET_FILE" || true
              exit 1
            fi
          else
            echo "::error::$TARGET_FILE not found"
            exit 1
          fi

          git add -A && git commit -q -m "Wild: branding and module version bypass" || true

      - name: Clean dirty flags
        run: |
          cd kernel_workspace
          sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" build/kernel/kleaf/impl/stamp.bzl 2>/dev/null || true
          sed -i 's/-dirty//' common/scripts/setlocalversion 2>/dev/null || true
          cd common
          git config user.email "ci@local"
          git config user.name "CI"
          git add -A && git commit -q -m "Wild: clean dirty flag" || true

      - name: Remove protected exports
        run: |
          cd kernel_workspace
          rm -rf common/android/abi_gki_protected_exports_* || true
          if grep -q '\"protected_exports_list\"' common/BUILD.bazel 2>/dev/null; then
            perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//;' common/BUILD.bazel
          fi
          if grep -q '^protected_modules = ' common/modules.bzl 2>/dev/null; then
            sed -i 's/protected_modules = \[.*\]/protected_modules = []/' common/modules.bzl
          fi
          ( cd common && git add -A && git commit -q -m "Wild: remove protected exports" || true )

      - name: Build kernel with Kleaf
        run: |
          cd kernel_workspace
          mkdir -p dist

          set +e
          tools/bazel run "${{ github.event.inputs.KLEAF_TARGET }}" \
            --config=fast \
            --config=stamp \
            --disk_cache="$HOME/.cache/bazel" \
            -- --dist_dir="$(pwd)/dist" 2>&1 | tee ../build.log
          STATUS=${PIPESTATUS[0]}
          set -e

          if [ "$STATUS" != "0" ]; then
            echo "::error::Kleaf build failed with status $STATUS"
            echo "Available dist targets:"
            tools/bazel query 'kind(".*", //common:*)' 2>/dev/null | grep -E '_dist$' | head -100 || true
            exit "$STATUS"
          fi

          echo "DIST_DIR=$(pwd)/dist" >> "$GITHUB_ENV"
          echo "Build done"
          ls -lah dist

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 -b gki-2.0 https://github.com/WildKernels/AnyKernel3.git AnyKernel3
          rm -rf AnyKernel3/.git

          DIST="kernel_workspace/dist"
          IMAGE=""
          for f in "$DIST/Image" "$DIST/Image.gz" "$DIST/Image.gz-dtb"; do
            [ -f "$f" ] && IMAGE="$f" && break
          done

          if [ -z "$IMAGE" ]; then
            echo "::error::No kernel image found in dist"
            find "$DIST" -maxdepth 1 -type f | sort
            exit 1
          fi

          cp "$IMAGE" "AnyKernel3/$(basename "$IMAGE")"
          [ -f "$DIST/dtbo.img" ] && cp "$DIST/dtbo.img" AnyKernel3/ || true

          cat > AnyKernel3/anykernel.sh <<'ANYKERNEL'
          ### AnyKernel3 Ramdisk Mod Script
          ## osm0sis @ xda-developers

          properties() { '
          kernel.string=KernelSU-Next | SUSFS v2.1.0 | BBG | DroidSpaces | Xiaomi 14T Pro (rothko) | GKI 6.1
          do.devicecheck=0
          do.modules=0
          do.systemless=0
          do.cleanup=1
          do.cleanuponabort=0
          do.check_boot_version=0
          device.name1=rothko
          device.name2=xiaomi14tpro
          device.name3=
          device.name4=
          device.name5=
          supported.versions=
          supported.patchlevels=
          supported.vendorpatchlevels=
          '; } # end properties

          block=boot
          is_slot_device=auto
          ramdisk_compression=auto
          patch_vbmeta_flag=auto
          no_magisk_check=1

          . tools/ak3-core.sh

          split_boot

          if [ -f "$SPLITIMG/ramdisk.cpio" ]; then
              unpack_ramdisk
              write_boot
          else
              flash_boot
          fi
          ANYKERNEL

          BUILD_DATE=$(date +"%Y%m%d-%H%M")
          ZIP_NAME="KernelSU-Next_Wild_Xiaomi14TPro_GKI6.1.138_${BUILD_DATE}.zip"
          cd AnyKernel3
          zip -r9 "../${ZIP_NAME}" . -x "*.git*" -x "*.github*" -x "LICENCE" -x "README.md"
          cd ..
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "ZIP_PATH=$(pwd)/${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_ENV"
          echo "AnyKernel3 zip: ${ZIP_NAME}"

      - name: Upload AnyKernel3 flashable
        uses: actions/upload-artifact@v4
        with:
          name: AnyKernel3-Xiaomi14TPro-Wild-KSUN-${{ env.BUILD_DATE }}
          path: AnyKernel3/*
          retention-days: 7

      - name: Upload boot images
        uses: actions/upload-artifact@v4
        with:
          name: boot-images-${{ env.BUILD_DATE }}
          path: |
            kernel_workspace/dist/boot.img
            kernel_workspace/dist/boot-lz4.img
            kernel_workspace/dist/boot-gz.img
            kernel_workspace/dist/Image
            build.log
          retention-days: 7

      - name: Create GitHub Release
        if: ${{ inputs.UPLOAD_RELEASE }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "wild-ksun-gki-v6.1.138-${{ env.BUILD_DATE }}"
          name: "KernelSU-Next Wild GKI | Xiaomi 14T Pro | ${{ env.BUILD_DATE }}"
          body: |
            ## Xiaomi 14T Pro Kernel - Wild KernelSU-Next GKI 6.1.138

            **Device:** Xiaomi 14T Pro (rothko)  
            **Build system:** Bazel/Kleaf from Android Common Kernel  
            **ACK branch:** `${{ github.event.inputs.ACK_BRANCH }}`  
            **Kleaf target:** `${{ github.event.inputs.KLEAF_TARGET }}`

            ### Features
            - KernelSU-Next (`dev-susfs`)
            - SUSFS v2.1+
            - Baseband Guard
            - DroidSpaces-OSS
            - WildKernels branding: `6.1.138-android14-Wild`
            - WildKernels module version bypass for vendor modules
            - Networking FULL: ipset, BBR, FQ, FQ_CODEL, RFKILL
            - ZRAM + ZSTD
            - NTFS3 + ExFAT
            - MGLRU
            - DAMON
            - TEO idle governor

            > GKI image. Flash on Xiaomi 14T Pro (rothko) only.
          files: |
            ${{ env.ZIP_PATH }}
            build.log
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up self-hosted runner
        if: always()
        run: |
          rm -rf AnyKernel3 *.zip /tmp/susfs4ksu /tmp/sukisu_setup.sh || true
          echo "Runner cleaned"
