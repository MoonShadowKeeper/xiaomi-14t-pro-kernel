name: 🏗️ Build Xiaomi 14T Pro Kernel (6.1.138)

on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: "Kernel source repo (owner/repo)"
        required: true
        default: "MoonShadowKeeper/xiaomi-14t-pro-kernel"
      KERNEL_BRANCH:
        description: "Kernel branch"
        required: true
        default: "main"
      DEFCONFIG:
        description: "Defconfig name"
        required: true
        default: "gki_defconfig"
      SUSFS_BRANCH:
        description: "SUSFS branch"
        required: true
        default: "kernel-6.1"
      ENABLE_KPM:
        description: "Enable KPM (Kernel Plugin Module)"
        required: false
        default: "true"
        type: boolean
      UPLOAD_RELEASE:
        description: "Upload as GitHub Release"
        required: false
        default: "true"
        type: boolean

env:
  KERNEL_VERSION: "6.1.138"
  ARCH: arm64
  SUBARCH: arm64
  # SukiSU Ultra
  SUKISU_REPO: "SukiSU-Ultra/SukiSU-Ultra"
  SUKISU_BRANCH: "main"
  # SUSFS
  SUSFS_REPO: "simonpunk/susfs4ksu"
  # Toolchain — AOSP Clang 18 (GKI compatible)
  CLANG_VERSION: "r522817"
  TZ: "UTC"

jobs:
  build:
    name: Build Kernel
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      # ─────────────────────────────────────────────────
      # 1. SETUP ENVIRONMENT
      # ─────────────────────────────────────────────────
      - name: 🧹 Clean workspace (self-hosted persists between runs)
        run: |
          rm -rf kernel_source AnyKernel3 *.zip build.log || true

      - name: 🛠️ Ensure build dependencies (best-effort, needs sudo)
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq || true
            sudo apt-get install -y --no-install-recommends \
              bc bison build-essential ca-certificates ccache curl flex \
              git kmod libelf-dev libssl-dev libncurses-dev lz4 make \
              ninja-build pahole perl python3 python3-pip rsync \
              unzip wget xz-utils zip zstd file binutils-aarch64-linux-gnu \
              gcc-aarch64-linux-gnu || echo "::warning::Could not install deps automatically — ensure they are present on the runner"
          else
            echo "::warning::apt-get not found — make sure build deps are pre-installed on this self-hosted runner"
          fi

      # ─────────────────────────────────────────────────
      # 2. TOOLCHAIN — AOSP Clang
      # ─────────────────────────────────────────────────
      - name: 🔧 Download AOSP Clang ${{ env.CLANG_VERSION }}
        run: |
          mkdir -p $HOME/toolchains/clang
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-${{ env.CLANG_VERSION }}.tar.gz"
          # Fallback: use prebuilt from CI mirror
          wget -q --show-progress \
            "https://github.com/ZyCromerZ/Clang/releases/download/18.0.0-20240417-release/Clang-18.0.0-20240417.tar.gz" \
            -O /tmp/clang.tar.gz
          tar -xf /tmp/clang.tar.gz -C $HOME/toolchains/clang
          echo "$HOME/toolchains/clang/bin" >> $GITHUB_PATH
          echo "CC=$HOME/toolchains/clang/bin/clang" >> $GITHUB_ENV
          echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV
          clang --version

      # ─────────────────────────────────────────────────
      # 3. KERNEL SOURCE
      # ─────────────────────────────────────────────────
      - name: 📥 Clone kernel source
        run: |
          git clone --depth=1 \
            --branch ${{ github.event.inputs.KERNEL_BRANCH }} \
            https://github.com/${{ github.event.inputs.KERNEL_SOURCE }} \
            kernel_source
          echo "KERNEL_DIR=$(pwd)/kernel_source" >> $GITHUB_ENV
          cd kernel_source
          echo "KERNEL_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ─────────────────────────────────────────────────
      # 4. SUKISU ULTRA + KPM
      # ─────────────────────────────────────────────────
      - name: 🔑 Integrate SukiSU Ultra (KernelSU fork)
        run: |
          cd kernel_source
          # Download SukiSU Ultra setup script
          curl -LSs "https://raw.githubusercontent.com/${{ env.SUKISU_REPO }}/${{ env.SUKISU_BRANCH }}/kernel/setup.sh" -o /tmp/sukisu_setup.sh
          bash /tmp/sukisu_setup.sh ${{ env.SUKISU_BRANCH }}
          echo "SukiSU Ultra integrated ✓"

      - name: 🔌 Enable KPM (Kernel Plugin Module)
        if: ${{ github.event.inputs.ENABLE_KPM == 'true' }}
        run: |
          cd kernel_source
          # KPM is built into SukiSU Ultra — enable via config
          # Check if kpm config fragment exists
          if [ -f "KernelSU/kernel/kpm.config" ]; then
            cat KernelSU/kernel/kpm.config >> arch/${{ env.ARCH }}/configs/${{ github.event.inputs.DEFCONFIG }}
          fi
          # Ensure KPM symbols are exported
          scripts/config --file arch/${{ env.ARCH }}/configs/${{ github.event.inputs.DEFCONFIG }} \
            -e KPM \
            -e KALLSYMS \
            -e KALLSYMS_ALL \
            -e KPROBES \
            -e HAVE_KPROBES \
            -e KPROBE_EVENTS \
            || true
          echo "KPM enabled ✓"

      # ─────────────────────────────────────────────────
      # 5. SUSFS v2.1+
      # ─────────────────────────────────────────────────
      - name: 🕵️ Apply SUSFS v2.1+ patches
        run: |
          SUSFS_DIR=/tmp/susfs4ksu
          git clone --depth=1 \
            --branch ${{ github.event.inputs.SUSFS_BRANCH }} \
            https://github.com/${{ env.SUSFS_REPO }} \
            $SUSFS_DIR

          cd kernel_source

          # Apply SUSFS kernel patches
          echo "Applying SUSFS kernel patch..."
          patch -p1 < $SUSFS_DIR/kernel_patches/50_add_susfs_in_kernel-${{ github.event.inputs.SUSFS_BRANCH }}.patch || \
          patch -p1 < $SUSFS_DIR/kernel_patches/50_add_susfs_in_kernel.patch

          # Apply SukiSU-specific SUSFS hooks
          if [ -f "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch" ]; then
            patch -p1 < $SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch || true
          fi
          echo "SUSFS v2.1+ applied ✓"

      # ─────────────────────────────────────────────────
      # 6. KERNEL FEATURE CONFIGS
      # ─────────────────────────────────────────────────
      - name: ⚙️ Apply kernel feature configs
        run: |
          cd kernel_source
          DEFCFG="arch/${{ env.ARCH }}/configs/${{ github.event.inputs.DEFCONFIG }}"

          scripts/config --file "$DEFCFG" \
            \
            `# ── BBR TCP congestion control ──` \
            -e TCP_CONG_BBR \
            -e NET_SCH_FQ \
            --set-str DEFAULT_TCP_CONG bbr \
            \
            `# ── WireGuard ──` \
            -e WIREGUARD \
            -e WIREGUARD_DEBUG \
            \
            `# ── ZRAM + ZSTD ──` \
            -e ZRAM \
            -e ZRAM_DEF_COMP_ZSTD \
            --set-str ZRAM_DEF_COMP "zstd" \
            -e CRYPTO_ZSTD \
            -e ZSMALLOC \
            -e ZSMALLOC_PGTABLE_MAPPING \
            \
            `# ── NTFS3 ──` \
            -e NTFS3_FS \
            -e NTFS3_LZX_XPRESS \
            -e NTFS3_FS_POSIX_ACL \
            \
            `# ── ExFAT ──` \
            -e EXFAT_FS \
            -e EXFAT_DEFAULT_IOCHARSET \
            \
            `# ── MGLRU (Multi-Generational LRU) ──` \
            -e LRU_GEN \
            -e LRU_GEN_ENABLED \
            -e LRU_GEN_STATS \
            \
            `# ── DAMON (Data Access Monitor) ──` \
            -e DAMON \
            -e DAMON_VADDR \
            -e DAMON_PADDR \
            -e DAMON_SYSFS \
            -e DAMON_DBGFS \
            -e DAMON_RECLAIM \
            -e DAMON_LRU_SORT \
            \
            `# ── TEO CPU idle governor ──` \
            -e CPU_IDLE_GOV_TEO \
            \
            `# ── General performance / security ──` \
            -e BPF_JIT \
            -e BPF_JIT_ALWAYS_ON \
            -e SECURITY \
            -e SECURITY_SELINUX \
            || true

          echo "Feature configs applied ✓"
          cat "$DEFCFG" | grep -E "BBR|WIREGUARD|ZRAM|NTFS3|EXFAT|LRU_GEN|DAMON|TEO|KSU|SUSFS" | sort

      # ─────────────────────────────────────────────────
      # 7. BUILD
      # ─────────────────────────────────────────────────
      - name: 🔨 Generate .config
        run: |
          cd kernel_source
          export PATH="$HOME/toolchains/clang/bin:$PATH"
          make \
            O=out \
            ARCH=${{ env.ARCH }} \
            SUBARCH=${{ env.SUBARCH }} \
            CC=clang \
            CLANG_TRIPLE=${{ env.CLANG_TRIPLE }} \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            ${{ github.event.inputs.DEFCONFIG }}

      - name: ⚙️ Apply olddefconfig to resolve new symbols
        run: |
          cd kernel_source
          export PATH="$HOME/toolchains/clang/bin:$PATH"
          make \
            O=out \
            ARCH=${{ env.ARCH }} \
            CC=clang \
            CLANG_TRIPLE=${{ env.CLANG_TRIPLE }} \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            olddefconfig

      - name: 🏗️ Build kernel image
        run: |
          cd kernel_source
          export PATH="$HOME/toolchains/clang/bin:$PATH"
          export KBUILD_BUILD_USER="MoonShadowKeeper"
          export KBUILD_BUILD_HOST="GithubActions"
          make \
            O=out \
            ARCH=${{ env.ARCH }} \
            SUBARCH=${{ env.SUBARCH }} \
            CC=clang \
            CLANG_TRIPLE=${{ env.CLANG_TRIPLE }} \
            CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            LLVM=1 \
            LLVM_IAS=1 \
            -j$(nproc --all) \
            Image.gz-dtb dtbo.img 2>&1 | tee build.log

          # Check build success
          if [ -f "out/arch/${{ env.ARCH }}/boot/Image.gz-dtb" ]; then
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
            echo "Kernel image built ✓"
          else
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
            echo "::error::Kernel build failed! Check build.log"
            exit 1
          fi

      # ─────────────────────────────────────────────────
      # 8. ANYKERNEL3 ZIP
      # ─────────────────────────────────────────────────
      - name: 📦 Package with AnyKernel3
        run: |
          git clone --depth=1 \
            https://github.com/osm0sis/AnyKernel3.git \
            AnyKernel3

          # Copy kernel image
          cp kernel_source/out/arch/${{ env.ARCH }}/boot/Image.gz-dtb AnyKernel3/
          [ -f kernel_source/out/arch/${{ env.ARCH }}/boot/dtbo.img ] && \
            cp kernel_source/out/arch/${{ env.ARCH }}/boot/dtbo.img AnyKernel3/ || true

          # Patch anykernel.sh for Xiaomi 14T Pro (vermeer)
          cat > AnyKernel3/anykernel.sh << 'ANYKERNEL'
          ## AnyKernel3 Ramdisk Mod Script
          # osm0sis @ xda-developers
          properties() { '
          kernel.string=SukiSU Ultra | Xiaomi 14T Pro | Kernel 6.1.138
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=vermeer
          device.name2=xiaomi14tpro
          supported.versions=14-15
          supported.patchlevels=
          '; }
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          . split_img;
          . flash_boot;
          ANYKERNEL

          # Build zip
          BUILD_DATE=$(date +"%Y%m%d-%H%M")
          ZIP_NAME="SukiSU-Ultra_Xiaomi14TPro_K6.1.138_${BUILD_DATE}.zip"
          cd AnyKernel3
          zip -r9 "../${ZIP_NAME}" . -x "*.git*" -x "*.github*" -x "LICENCE" -x "README.md"
          cd ..
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "ZIP_PATH=$(pwd)/${ZIP_NAME}" >> $GITHUB_ENV
          echo "BUILD_DATE=${BUILD_DATE}" >> $GITHUB_ENV
          echo "AnyKernel3 zip created: ${ZIP_NAME} ✓"

      # ─────────────────────────────────────────────────
      # 9. UPLOAD ARTIFACTS
      # ─────────────────────────────────────────────────
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-xiaomi14tpro-${{ env.BUILD_DATE }}
          path: |
            ${{ env.ZIP_PATH }}
            kernel_source/out/arch/arm64/boot/Image.gz-dtb
            kernel_source/out/arch/arm64/boot/dtbo.img
            kernel_source/build.log
          retention-days: 7

      - name: 🏷️ Create GitHub Release
        if: ${{ github.event.inputs.UPLOAD_RELEASE == 'true' && env.BUILD_SUCCESS == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v6.1.138-${{ env.BUILD_DATE }}"
          name: "SukiSU Ultra | Xiaomi 14T Pro | ${{ env.BUILD_DATE }}"
          body: |
            ## 🏗️ Xiaomi 14T Pro Kernel — 6.1.138
            
            **Device:** Xiaomi 14T Pro (vermeer) | Dimensity 9300  
            **Base kernel:** 6.1.138  
            **Build date:** ${{ env.BUILD_DATE }}  
            **Commit:** ${{ env.KERNEL_HASH }}
            
            ---
            
            ### ✅ Included features
            
            | Feature | Status |
            |---------|--------|
            | 🔑 SukiSU Ultra (KernelSU fork) | ✅ |
            | 🕵️ SUSFS v2.1+ | ✅ |
            | 🔌 KPM (Kernel Plugin Module) | ✅ |
            | 📡 TCP BBR congestion control | ✅ |
            | 🔒 WireGuard VPN | ✅ |
            | 💾 ZRAM + ZSTD compression | ✅ |
            | 📁 NTFS3 filesystem | ✅ |
            | 📁 ExFAT filesystem | ✅ |
            | 🧹 MGLRU (Multi-Gen LRU) | ✅ |
            | 📊 DAMON memory management | ✅ |
            | ⚡ TEO CPU idle governor | ✅ |
            
            ---
            
            ### 📲 Installation
            1. Boot into TWRP or flash via Magisk/KernelFlasher
            2. Flash `${{ env.ZIP_NAME }}`
            3. Reboot
            
            > ⚠️ Only for Xiaomi 14T Pro (vermeer). Verify device before flashing.
          files: |
            ${{ env.ZIP_PATH }}
            kernel_source/build.log
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─────────────────────────────────────────────────
      # 10. CLEANUP (self-hosted runner persists state)
      # ─────────────────────────────────────────────────
      - name: 🧹 Clean up build artifacts from runner
        if: always()
        run: |
          rm -rf kernel_source AnyKernel3 *.zip || true
          rm -rf $HOME/toolchains/clang/*.tar.gz /tmp/clang.tar.gz /tmp/susfs4ksu /tmp/sukisu_setup.sh || true
          echo "Runner cleaned ✓"
