name: Build Custom GKI Kernel (Xiaomi 14T Pro)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel
    runs-on: self-hosted
    env:
      HOME: /root
      MANIFEST_BRANCH: common-android14-6.1
      SUSFS_BRANCH: gki-android14-6.1
      SUSFS_PATCH: 50_add_susfs_in_gki-android14-6.1.patch
      GKI_VERSION: "6.1"
      WORKSPACE: /root/kernel_workspace
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Clean Workspace
      run: |
        find $WORKSPACE -name "*.lock" -delete 2>/dev/null || true
        if [ -d $WORKSPACE/common/.git ]; then
          git -C $WORKSPACE/common reset --hard HEAD 2>/dev/null || true
          git -C $WORKSPACE/common clean -fdx 2>/dev/null || true
        fi
        rm -rf $WORKSPACE/out
        rm -rf $WORKSPACE/susfs4ksu
        rm -rf $WORKSPACE/AnyKernel3

    - name: Install Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git-core gnupg flex bison build-essential zip curl \
          zlib1g-dev libc6-dev-i386 libx11-dev lib32z1-dev \
          libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
          python3 python-is-python3 bc lz4 libelf-dev libssl-dev \
          ccache repo

    - name: Setup repo tool (fallback if package not available)
      run: |
        if ! command -v repo &>/dev/null; then
          mkdir -p /usr/local/bin
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo \
            -o /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo
        fi
        repo --version

    - name: Initialize and Sync Kernel Source
      run: |
        mkdir -p $WORKSPACE
        cd $WORKSPACE
        repo init \
          -u https://android.googlesource.com/kernel/manifest \
          -b "$MANIFEST_BRANCH" \
          --depth=1 \
          --repo-rev=stable
        repo sync -c -j$(nproc) --no-clone-bundle --force-checkout --no-tags

    - name: Apply SUSFS Patches
      run: |
        cd $WORKSPACE
        git clone --depth=1 \
          https://gitlab.com/simonpunk/susfs4ksu.git \
          -b "$SUSFS_BRANCH" susfs4ksu

        cd common
        git reset --hard HEAD
        git clean -fdx

        # Copy SUSFS source files
        cp -rv ../susfs4ksu/kernel_patches/fs/* fs/
        cp -rv ../susfs4ksu/kernel_patches/include/linux/* include/linux/

        # Apply the main SUSFS patch.
        # --fuzz=5: allow up to 5 lines of context mismatch (handles Google's
        # minor upstream changes that shift lines without changing the code we patch).
        # This is the proper solution — no sed hacks needed.
        patch -p1 --fuzz=5 --forward < "../susfs4ksu/kernel_patches/${SUSFS_PATCH}"

        echo "SUSFS patch applied successfully"

    - name: Apply SukiSU Ultra (KernelSU)
      run: |
        cd $WORKSPACE/common
        curl -fsSL \
          "https://raw.githubusercontent.com/sukisu-ultra/sukisu-ultra/main/kernel/setup.sh" \
          | bash -s susfs

    - name: Apply Kernel Features (BBR, ZRAM, NTFS3, ExFAT, LRU, DAMON)
      run: |
        cd $WORKSPACE/common
        # Remove -dirty suffix from kernel version string
        sed -i 's/-dirty//' scripts/setlocalversion || true

        DEFCONFIG=arch/arm64/configs/gki_defconfig
        cat >> "$DEFCONFIG" << 'EOF'

# === Networking ===
CONFIG_TCP_CONG_BBR=y
CONFIG_DEFAULT_BBR=y
CONFIG_NET_SCH_FQ=y
CONFIG_WIREGUARD=y

# === Filesystem ===
CONFIG_TMPFS_XATTR=y
CONFIG_TMPFS_POSIX_ACL=y
CONFIG_NTFS3_FS=y
CONFIG_NTFS3_FS_POSIX_ACL=y
CONFIG_EXFAT_FS=y
CONFIG_EXFAT_DEFAULT_IOCHARSET="utf8"

# === Memory management ===
CONFIG_LRU_GEN=y
CONFIG_LRU_GEN_ENABLED=y
CONFIG_LRU_GEN_STATS=y
CONFIG_DAMON=y
CONFIG_DAMON_VADDR=y
CONFIG_DAMON_PADDR=y
CONFIG_DAMON_RECLAIM=y

# === Power ===
CONFIG_CPU_IDLE_GOV_TEO=y
CONFIG_ENERGY_MODEL=y
CONFIG_SCHED_MC=y

# === KPM / KernelSU modules ===
CONFIG_KPM=y

# === ZRAM with ZSTD ===
CONFIG_ZSMALLOC=m
CONFIG_ZRAM=m
CONFIG_CRYPTO_ZSTD=y
CONFIG_ZRAM_DEF_COMP_ZSTD=y
CONFIG_ZRAM_DEF_COMP="zstd"
EOF

    - name: Build the Kernel (Kleaf / Bazel)
      run: |
        cd $WORKSPACE
        # LTO=thin: best balance of build time and performance
        # If OOM occurs, change to LTO=none
        LTO=thin tools/bazel run \
          //common:kernel_aarch64_dist \
          -- \
          --dist_dir="$WORKSPACE/out/dist"

    - name: Package with AnyKernel3
      run: |
        cd $WORKSPACE
        git clone --depth=1 \
          https://github.com/MoonShadowKeeper/AnyKernel3.git \
          -b master AnyKernel3
        rm -rf AnyKernel3/.git

        sed -i "s/kernel.string=.*/kernel.string=SukiSU-Ultra GKI ${GKI_VERSION} + SUSFS (Xiaomi 14T Pro)/" \
          AnyKernel3/anykernel.sh

        KERNEL_IMAGE=$(find "$WORKSPACE/out/dist" -name "Image" -type f 2>/dev/null | tail -1)
        if [ -z "$KERNEL_IMAGE" ]; then
          echo "ERROR: Image not found in $WORKSPACE/out/dist"
          find "$WORKSPACE/out" -name "Image" -type f || true
          exit 1
        fi
        echo "Found kernel image: $KERNEL_IMAGE"
        cp "$KERNEL_IMAGE" AnyKernel3/

        KERNEL_CONFIG=$(find "$WORKSPACE/out" -name ".config" -type f 2>/dev/null | tail -1)
        if [ -n "$KERNEL_CONFIG" ]; then
          cp "$KERNEL_CONFIG" "$WORKSPACE/kernel-Xiaomi-14T-Pro-GKI-${GKI_VERSION}.config"
        fi

        cd AnyKernel3
        zip -r9 "$WORKSPACE/AnyKernel3-Xiaomi-14T-Pro-GKI-${GKI_VERSION}.zip" . -x "*.git*"

    - name: Upload AnyKernel3 ZIP
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-Xiaomi-14T-Pro-GKI-${{ env.GKI_VERSION }}
        path: /root/kernel_workspace/AnyKernel3-*.zip
        if-no-files-found: error

    - name: Upload Kernel Config
      uses: actions/upload-artifact@v4
      with:
        name: kernel-config-Xiaomi-14T-Pro-GKI-${{ env.GKI_VERSION }}
        path: /root/kernel_workspace/kernel-*.config
        if-no-files-found: warn
