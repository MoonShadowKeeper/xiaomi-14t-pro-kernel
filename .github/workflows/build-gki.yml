name: Build Custom GKI Kernel (Xiaomi 14T Pro)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Kernel
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 120

    env:
      # HOME is set dynamically below — not hardcoded to /root
      MANIFEST_BRANCH: common-android14-6.1
      SUSFS_BRANCH: gki-android14-6.1
      SUSFS_PATCH: 50_add_susfs_in_gki-android14-6.1.patch
      GKI_VERSION: "6.1"


    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Dynamic Environment
      run: |
        RUNNER_HOME=$(eval echo ~$(whoami))
        WORKSPACE="$RUNNER_HOME/kernel_workspace"
        echo "RUNNER_HOME=$RUNNER_HOME"   >> $GITHUB_ENV
        echo "WORKSPACE=$WORKSPACE"       >> $GITHUB_ENV
        echo "CCACHE_DIR=$WORKSPACE/.ccache" >> $GITHUB_ENV
        echo "Running as: $(whoami), HOME: $RUNNER_HOME"

    - name: Clean Workspace
      run: |
        find "$WORKSPACE" -name "*.lock" -delete 2>/dev/null || true
        if [ -d "$WORKSPACE/common/.git" ]; then
          git -C "$WORKSPACE/common" reset --hard HEAD 2>/dev/null || true
          git -C "$WORKSPACE/common" clean -fdx 2>/dev/null || true
        fi
        rm -rf "$WORKSPACE/out"
        rm -rf "$WORKSPACE/susfs4ksu"
        rm -rf "$WORKSPACE/AnyKernel3"

    - name: Install Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git-core gnupg flex bison build-essential zip curl \
          zlib1g-dev libc6-dev-i386 libx11-dev lib32z1-dev \
          libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig \
          python3 python-is-python3 bc lz4 libelf-dev libssl-dev \
          ccache repo

    - name: Setup repo tool (fallback if package not available)
      run: |
        if ! command -v repo &>/dev/null; then
          mkdir -p /usr/local/bin
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo \
            -o /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo
        fi
        repo --version

    - name: Configure ccache
      run: |
        ccache --set-config=max_size=10G
        ccache --set-config=compression=true
        ccache --set-config=compression_level=6
        ccache --zero-stats
        echo "USE_CCACHE=1" >> $GITHUB_ENV
        echo "CCACHE_EXEC=$(command -v ccache)" >> $GITHUB_ENV
        ccache --show-config

    - name: Initialize and Sync Kernel Source
      run: |
        mkdir -p "$WORKSPACE"
        cd "$WORKSPACE"
        repo init \
          -u https://android.googlesource.com/kernel/manifest \
          -b "$MANIFEST_BRANCH" \
          --depth=1 \
          --repo-rev=stable
        repo sync -c \
          -j$(nproc) \
          --no-clone-bundle \
          --force-checkout \
          --no-tags \
          --retry-fetches=3

    - name: Apply SUSFS Patches
      run: |
        cd "$WORKSPACE"
        git clone --depth=1 \
          https://gitlab.com/simonpunk/susfs4ksu.git \
          -b "$SUSFS_BRANCH" susfs4ksu

        cd common
        git reset --hard HEAD
        git clean -fdx

        # Copy SUSFS source files
        cp -rv ../susfs4ksu/kernel_patches/fs/* fs/
        cp -rv ../susfs4ksu/kernel_patches/include/linux/* include/linux/

        # Apply the vendored SUSFS patch with Xiaomi 14T GKI context fixes.
        git apply --check --recount \
          "$GITHUB_WORKSPACE/patches/50_add_susfs_in_gki-android14-6.1-xiaomi14t.patch"
        git apply --recount \
          "$GITHUB_WORKSPACE/patches/50_add_susfs_in_gki-android14-6.1-xiaomi14t.patch"

        # Final verification: check for the specific namespace.c SUSFS hooks.
        grep -q 'susfs_def.h' fs/namespace.c || {
          echo "::error::susfs_def.h include missing from namespace.c"
          exit 1
        }
        grep -q 'susfs_is_current_ksu_domain' fs/namespace.c || {
          echo "::error::susfs namespace externs missing from namespace.c"
          exit 1
        }
        echo "SUSFS patch step complete — vendored patch applied cleanly"

    - name: Apply SukiSU Ultra (KernelSU)
      run: |
        cd "$WORKSPACE/common"

        # Download first, verify it's a valid shell script, then execute.
        # Full hash verification is not possible since upstream doesn't publish checksums.
        curl -fsSL \
          "https://raw.githubusercontent.com/sukisu-ultra/sukisu-ultra/main/kernel/setup.sh" \
          -o /tmp/sukisu_setup.sh

        # Basic sanity check: must be a shell script (not HTML error page)
        head -1 /tmp/sukisu_setup.sh | grep -q '^#!' || {
          echo "::error::Downloaded setup.sh does not look like a shell script (possible network error or compromise)"
          exit 1
        }

        bash /tmp/sukisu_setup.sh susfs
        rm -f /tmp/sukisu_setup.sh

    - name: Apply Kernel Features (BBR, ZRAM, NTFS3, ExFAT, LRU, DAMON)
      run: |
        cd "$WORKSPACE/common"
        # Remove -dirty suffix from kernel version string
        sed -i 's/-dirty//' scripts/setlocalversion || true

        # Kleaf validates defconfig via savedefconfig — we must not append raw lines.
        # Instead we use merge_config.sh with a fragment file checked into the repo.
        ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
          scripts/kconfig/merge_config.sh -m \
          arch/arm64/configs/gki_defconfig \
          "$GITHUB_WORKSPACE/configs/xiaomi_14t_tweaks.config"
        mv .config arch/arm64/configs/gki_defconfig
        make ARCH=arm64 savedefconfig 2>/dev/null || true
        cp defconfig arch/arm64/configs/gki_defconfig 2>/dev/null || true

    - name: Build the Kernel (Kleaf / Bazel)
      env:
        CCACHE_DIR: ${{ env.CCACHE_DIR }}
        USE_CCACHE: "1"
      run: |
        cd "$WORKSPACE"
        # LTO=thin: best balance of build time and performance.
        # Change to LTO=none if OOM occurs on low-RAM servers.
        LTO=thin tools/bazel run \
          //common:kernel_aarch64_dist \
          -- \
          --dist_dir="$WORKSPACE/out/dist"
        ccache --show-stats

    - name: Verify Kernel Configuration
      run: |
        # Find the final .config produced by Bazel
        FINAL_CONFIG=$(find "$WORKSPACE/out" -name ".config" -type f 2>/dev/null | tail -1)
        if [ -z "$FINAL_CONFIG" ]; then
          echo "::error::No .config found in $WORKSPACE/out — Bazel build may have failed"
          exit 1
        fi
        echo "Verifying: $FINAL_CONFIG"
        python3 "$GITHUB_WORKSPACE/scripts/verify_kernel_config.py" "$FINAL_CONFIG"

    - name: Package with AnyKernel3
      run: |
        cd "$WORKSPACE"
        git clone --depth=1 \
          https://github.com/MoonShadowKeeper/AnyKernel3.git \
          -b master AnyKernel3
        rm -rf AnyKernel3/.git

        sed -i \
          "s/kernel.string=.*/kernel.string=SukiSU-Ultra GKI ${GKI_VERSION} + SUSFS (Xiaomi 14T Pro)/" \
          AnyKernel3/anykernel.sh

        # Strict: fail loudly if exactly 1 Image is not found
        mapfile -t IMAGES < <(find "$WORKSPACE/out/dist" -name "Image" -type f 2>/dev/null)
        if [[ ${#IMAGES[@]} -ne 1 ]]; then
          echo "::error::Expected exactly 1 kernel Image, found ${#IMAGES[@]}:"
          printf '  %s\n' "${IMAGES[@]}"
          exit 1
        fi
        KERNEL_IMAGE="${IMAGES[0]}"
        echo "Kernel image: $KERNEL_IMAGE"
        cp "$KERNEL_IMAGE" AnyKernel3/

        # Config is optional (for debug), warn if missing
        mapfile -t CONFIGS < <(find "$WORKSPACE/out" -name ".config" -type f 2>/dev/null)
        if [[ ${#CONFIGS[@]} -ge 1 ]]; then
          cp "${CONFIGS[0]}" "$WORKSPACE/kernel-Xiaomi-14T-Pro-GKI-${GKI_VERSION}.config"
        else
          echo "::warning::Kernel .config not found — skipping config upload"
        fi

        cd AnyKernel3
        zip -r9 \
          "$WORKSPACE/AnyKernel3-Xiaomi-14T-Pro-GKI-${GKI_VERSION}.zip" \
          . -x "*.git*"

    - name: Upload AnyKernel3 ZIP
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-Xiaomi-14T-Pro-GKI-${{ env.GKI_VERSION }}
        path: ${{ env.WORKSPACE }}/AnyKernel3-*.zip
        if-no-files-found: error

    - name: Upload Kernel Config
      uses: actions/upload-artifact@v4
      with:
        name: kernel-config-Xiaomi-14T-Pro-GKI-${{ env.GKI_VERSION }}
        path: ${{ env.WORKSPACE }}/kernel-*.config
        if-no-files-found: error

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        cd "$WORKSPACE"

        mapfile -t RELEASE_ZIPS < <(find "$WORKSPACE" -maxdepth 1 -name "AnyKernel3-Xiaomi-14T-Pro-GKI-${GKI_VERSION}.zip" -type f)
        if [[ ${#RELEASE_ZIPS[@]} -ne 1 ]]; then
          echo "::error::Expected exactly 1 release ZIP, found ${#RELEASE_ZIPS[@]}"
          printf '  %s\n' "${RELEASE_ZIPS[@]}"
          exit 1
        fi

        mapfile -t RELEASE_CONFIGS < <(find "$WORKSPACE" -maxdepth 1 -name "kernel-Xiaomi-14T-Pro-GKI-${GKI_VERSION}.config" -type f)

        KERNEL_VERSION=$(make -s -C "$WORKSPACE/common" kernelversion 2>/dev/null || true)
        if [[ -z "$KERNEL_VERSION" ]]; then
          KERNEL_VERSION=$(awk '
            /^VERSION =/ { v=$3 }
            /^PATCHLEVEL =/ { p=$3 }
            /^SUBLEVEL =/ { s=$3 }
            /^EXTRAVERSION =/ { e=$3 }
            END { if (v && p && s) printf "%s.%s.%s%s", v, p, s, e }
          ' "$WORKSPACE/common/Makefile")
        fi
        KERNEL_VERSION=${KERNEL_VERSION:-unknown}

        COMPILATION_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
        MANAGER_NAME="SukiSU-Ultra"
        SUKISU_VERSION=$(grep -RhoE 'SukiSU[^0-9]*[0-9]+' "$WORKSPACE/common/drivers/kernelsu" 2>/dev/null | grep -oE '[0-9]+' | sort -nr | head -1 || true)
        if [[ -z "$SUKISU_VERSION" ]]; then
          SUKISU_VERSION=$(grep -RhoE 'KSU_VERSION[^0-9]*[0-9]+' "$WORKSPACE/common/drivers/kernelsu" 2>/dev/null | grep -oE '[0-9]+' | sort -nr | head -1 || true)
        fi
        SUKISU_VERSION=${SUKISU_VERSION:-unknown}

        SUSFS_VERSION=$(grep -RhoE 'SUSFS_VERSION[^0-9]*[0-9]+(\.[0-9]+)*' \
          "$WORKSPACE/common/fs/susfs.c" \
          "$WORKSPACE/common/include/linux/susfs.h" \
          "$WORKSPACE/common/include/linux/susfs_def.h" 2>/dev/null | grep -oE '[0-9]+(\.[0-9]+)*' | head -1 || true)
        SUSFS_VERSION=${SUSFS_VERSION:-unknown}

        RELEASE_TAG="xiaomi-14t-pro-gki-${KERNEL_VERSION}-sukisu-${SUKISU_VERSION}-susfs-${SUSFS_VERSION}-${GITHUB_RUN_NUMBER}"
        RELEASE_TITLE="Xiaomi 14T Pro GKI ${KERNEL_VERSION} | ${MANAGER_NAME} ${SUKISU_VERSION} | SUSFS ${SUSFS_VERSION}"

        {
          echo "## Xiaomi 14T Pro Custom GKI Kernel"
          echo
          echo "- Compilation time: ${COMPILATION_TIME}"
          echo "- Kernel version: ${KERNEL_VERSION}"
          echo "- SukiSU Version: ${SUKISU_VERSION}"
          echo "- SusFS Version: ${SUSFS_VERSION}"
          echo "- Manager: ${MANAGER_NAME}"
          echo "- GKI base: ${GKI_VERSION}"
          echo "- Manifest branch: ${MANIFEST_BRANCH}"
          echo "- SUSFS branch: ${SUSFS_BRANCH}"
          echo "- Commit: ${GITHUB_SHA}"
          echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        } > release-notes.md

        RELEASE_ASSETS=("${RELEASE_ZIPS[0]}")
        if [[ ${#RELEASE_CONFIGS[@]} -ge 1 ]]; then
          RELEASE_ASSETS+=("${RELEASE_CONFIGS[0]}")
        fi

        gh release create "$RELEASE_TAG" "${RELEASE_ASSETS[@]}" \
          --title "$RELEASE_TITLE" \
          --notes-file release-notes.md \
          --target "$GITHUB_SHA"

    - name: ccache Statistics
      if: always()
      run: ccache --show-stats || true
